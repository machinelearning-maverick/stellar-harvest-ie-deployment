services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: stellar-harvest-ie-deployment_zookeeper-1
    restart: always
    ports:
      - "2181:2181"                    # client port
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - stellar-harvest-ie_zk-data:/var/lib/zookeeper/data
      - stellar-harvest-ie_zk-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: stellar-harvest-ie-deployment_kafka-1
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"                    # broker port for clients
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - stellar-harvest-ie_kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_URI: ${KAFKA_URI}
      KAFKA_TOPIC_SWPC: ${KAFKA_TOPIC_SWPC}
    entrypoint: ["/bin/bash", "-c"]
    command: "kafka-topics --create --if-not-exists --bootstrap-server $$KAFKA_URI --topic $$KAFKA_TOPIC_SWPC --partitions 1 --replication-factor 1"
    restart: on-failure

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: stellar-harvest-ie-deployment_kafkadrop-1
    depends_on:
      - kafka
      - zookeeper
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:9092"

  producer-swpc-scheduler:
    build:
      context: ${PROJECT_ROOT}/stellar-harvest-ie-deployment
      dockerfile: Dockerfile.scheduler
      args:
        DEVPI_HASEK_DEV_URL: ${DEVPI_HASEK_DEV_URL}
      secrets:
        - env
      extra_hosts:
        - "host.docker.internal:host-gateway"
    depends_on:
      - kafka
    secrets:
      - env
    environment:
      KAFKA_URI: ${KAFKA_URI}
      KAFKA_TOPIC_SWPC: ${KAFKA_TOPIC_SWPC}
      SCHEDULE_EVERY_MINUTES: ${SCHEDULE_EVERY_MINUTES}
    restart: always

  consumer-swpc:
    build:
      context: ${PROJECT_ROOT}/stellar-harvest-ie-consumers
      dockerfile: Dockerfile.consumers
      secrets:
        - env
      extra_hosts:
        - "host.docker.internal:host-gateway"
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    secrets:
      - env
    restart: always

  ui:
    build:
      context: ${PROJECT_ROOT}/stellar-harvest-ie-ui
      dockerfile: Dockerfile.ui
      secrets:
        - env
      extra_hosts:
        - "host.docker.internal:host-gateway"
    secrets:
      - env

volumes:
  stellar-harvest-ie_zk-data:
  stellar-harvest-ie_zk-log:
  stellar-harvest-ie_kafka-data:

secrets:
  env:
    file: ../.env
